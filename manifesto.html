<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nafir Suriyya Manifesto</title>

<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;600&family=Amiri:wght@400;700&display=swap" rel="stylesheet">

<style>
html {}
    
body {
    margin: 0 auto;
    padding: 0;
    font-family: 'EB Garamond', serif;
    position: relative;
    line-height: 1.7;
}

.bg {
    position: absolute;
    inset: 0;
    background: url("https://upload.wikimedia.org/wikipedia/commons/8/84/Parchment.00.jpg")
    center/cover no-repeat;
    opacity: 0.4;
    z-index: 0;
    pointer-events: none;
}

/* CONTENT WRAPPER */
.container {
    max-width: 800px;
    margin: 80px auto;
    padding: 0 20px;
}

/* HEADER (matches index style) */
.header {
    text-align: center;
    margin-bottom: 60px;
}

/* PORTAL TITLE BUTTON */
.portal-title {
    display: inline-block;
    font-size: 2rem;
    font-weight: 600;
    text-decoration: none;
    color: #000;
    transition: all 0.3s ease;
}

.portal-title:hover {
    transform: scale(1.05);
    box-shadow: none;
}

/* ARABIC SUBTITLE */
.arabic-header {
    margin-top: 5px;
    font-family: 'Amiri', serif;
    font-size: 1.5rem;
    direction: rtl;
}

/* TEXT STYLES */
h1 {
    text-align: center;
}

.lang-toggle {
    text-align: center;
    margin-bottom: 40px;
}

/* LANGUAGE BUTTONS */
.lang-toggle button {
    font-family: 'EB Garamond', serif;
    padding: 12px 24px;
    margin: 0 5px;
    border: 1px solid #000;
    background: transparent;
    cursor: pointer;
}

/* OPTIONAL: subtle hover */
.lang-toggle button:hover {
    background: rgba(0,0,0,0.05);
}
</style>
</head>

<body>

<div class="bg">
    .bg 
</div>


<div class="container">

    <!-- HEADER BUTTON -->
    <div class="header">
        <a href="index.html" class="portal-title">Nafir Suriyya Portal</a>
        <div class="arabic-header">بوَّابَةُ نَفِيرِ سُورِيَّة</div>
    </div>

    <!-- LANGUAGE TOGGLE -->
    <div class="lang-toggle">
        <button onclick="setLang('en')">English</button>
        <button onclick="setLang('ar')">العربية</button>
    </div>

    <!-- ENGLISH -->
    <div id="en">
        <h2>On Syria as a Continuous Geographic and Civilisational Nation</h2>

        <h3>
        Forthcoming...
        </h3>
        
    </div>

    <!-- ARABIC -->
    <div id="ar" dir="rtl" style="display:none;">
        <h2>سوريا كدولة جغرافية وحضارية متصلة كاملة السيادة</h2>

        <h3>
        ...قادم
        </h3>

    </div>

</div>

<script>
function setLang(lang) {
    document.getElementById("en").style.display = (lang === "en") ? "block" : "none";
    document.getElementById("ar").style.display = (lang === "ar") ? "block" : "none";
}
</script>

</body>
</html>
